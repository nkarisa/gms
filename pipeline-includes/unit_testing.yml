unit_tests:
  services:
    - name: mysql:8.0
      alias: mysql

.installs:
  script:
    - apt-get update -yqq
    - apt-get install git unzip gettext-base zlib1g-dev default-mysql-client libicu-dev -yqq # Install git and unzip, often needed for composer
    - docker-php-ext-configure intl
    - docker-php-ext-install intl
    - docker-php-ext-install mysqli
    - docker-php-ext-install pdo_mysql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer # Install Composer
    - composer update --prefer-dist --no-ansi --no-interaction 

    - |
      for i in $(seq 1 30); do
        mysql -h mysql -mysql root -p"$MYSQL_ROOT_PASSWORD" -e "status" > /dev/null 2>&1 && break
        echo "Waiting for MySQL to be ready..."
        sleep 1
      done
    - mysql -h mysql -h mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS $MYSQL_DATABASE;"
    - echo "Importing database schema from database_schema.sql into $MYSQL_DATABASE..."
    - mysql -h mysql -u root -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" < app/Database/schema.sql
    - echo "Database schema imported successfully."
    # - BASE_URL='http://localhost/'
    # - VARS_TO_SUBST='BASE_URL LOGTAIL_TOKEN CI_ENVIRONMENT SHA256_PASSWORD_SALT DB_HOST DB_PASS'
    # - envsubst "$VARS_TO_SUBST" < env > .env.tmp && mv .env.tmp .env

.unit_test:
  script:
    - !reference [.installs, script]
    - vendor/bin/phpunit --colors --testdox --log-junit phpunit-report.xml
    - echo "Unit Testing Successful"