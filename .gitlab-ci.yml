
variables:
    XDEBUG_MODE: "coverage" 
    CONTAINER_SCANNING_DISABLED: "true"

cache:
  key: "${CI_JOB_NAME}-build"
  paths:
      - vendor

.test_deps: &test_dep_script
  - echo "Command holder"
  # - apk add --no-cache git unzip mysql-client gettext
  # - apk add --no-cache --update icu-dev
  # - docker-php-ext-install intl
  # - docker-php-ext-install mysqli
  # - docker-php-ext-install pdo_mysql
  # - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  # - ls -la
  # - composer install --prefer-dist --no-interaction --optimize-autoloader
  # - chmod -R 777 writable/

include:
  - component: &core-yaml-tpl $CI_SERVER_FQDN/ciorg/community/cmf/pipeline/core-yaml/include@2.4
    inputs: &core-yaml-input
      deploy_stages: ''
      feature_deploy_stages: ''
      manual_promote_to_stage: 'no' # auto promote to stage
      manual_promote_to_prod: 'no' # auto promte to prod
      final_deploy_behavior: on_success # default manual
      is_http_service: false
      build_and_test_image_version: '8.2-fpm-alpine'
      build_and_test_image: php 
      service_language: golang # Ignore this one. Used only to satisfy the logic checks
      include_build_job: false
      deploy_tooling: 'terraform'
      terraform_dir: 'terraform'
      include_container_build_job: true
      unit_tests_script: 
        - *test_dep_script
        # - vendor/bin/phpunit --log-junit build/junit.xml 
        # - |
        #   ./vendor/bin/phpunit \
        #     --coverage-text \
        #     --log-junit build/phpunit.xml \
        #     --colors=never \
        #       tests 
        - echo "Unit testing successful"
      smoke_tests_script:
        - echo "Smoke test successful"
      integration_tests_script:
        - echo "Integration test successful"
      container_build_dockerfile_path: "./Dockerfile"
      feature_deploy_env: devint
      state_type: "s3_bypath"
      container_build_destination: "234204504144.dkr.ecr.eu-west-1.amazonaws.com/safinav3"
      container_build_args: "BASE_URL=$BASE_URL LOGTAIL_TOKEN=$LOGTAIL_TOKEN DB_HOST=$DB_HOST DB_PASS=$DB_PASS SHA256_PASSWORD_SALT=$SHA256_PASSWORD_SALT"
    rules:
      - if: >-
          $CI_COMMIT_TAG !~ /.*-prod/i

  - component: *core-yaml-tpl
    inputs: 
      <<: *core-yaml-input
      deploy_stages: blue-green,canary
      canary_deploy_behavior: on_success
      final_deploy_behavior: manual
    rules:
      - if: >-
          $CI_COMMIT_TAG =~ /.*-prod/i 
