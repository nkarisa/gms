listen 8080 default_server;
listen [::]:8080 default_server;

root /var/www/html/public;

# Set allowed "index" files
index index.html index.htm index.php;

server_name _;

charset utf-8;

# Set max upload to 2048M
client_max_body_size 2048M;

# Healthchecks: Set /healthcheck to be the healthcheck URL
location /healthcheck {
    access_log off;

    # set max 5 seconds for healthcheck
    fastcgi_read_timeout 5s;

    include        fastcgi_params;
    fastcgi_param  SCRIPT_NAME     /healthcheck;
    fastcgi_param  SCRIPT_FILENAME /healthcheck;
    fastcgi_pass   127.0.0.1:9000;
}

# --- Configuration for /prod/ path ---
location ~ ^/prod/(.*)$ {
    # Rewrite the URL to remove /prod/ and allow CodeIgniter to handle it
    rewrite ^/prod/(.*)$ /$1 break;

    # Try to serve files directly if they exist (e.g., assets like CSS, JS, images)
    try_files $uri $uri/ /index.php?$query_string;

    # Pass PHP requests to the PHP-FPM service for this specific location
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO $fastcgi_path_info; # Keep this for CI to get path segments
        fastcgi_param  CI_ENVIRONMENT production; # Set environment for production
        include        fastcgi_params;
        fastcgi_buffers 8 8k;
        fastcgi_buffer_size 8k;
        fastcgi_read_timeout 99;
    }
}

# --- Configuration for /devint/ path ---
location ~ ^/devint/(.*)$ {
    # Rewrite the URL to remove /devint/ and allow CodeIgniter to handle it
    rewrite ^/devint/(.*)$ /$1 break;

    try_files $uri $uri/ /index.php?$query_string;

    # Pass PHP requests to the PHP-FPM service for this specific location
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO $fastcgi_path_info; # Keep this for CI to get path segments
        fastcgi_param  CI_ENVIRONMENT development; # Set environment for development/integration
        include        fastcgi_params;
        fastcgi_buffers 8 8k;
        fastcgi_buffer_size 8k;
        fastcgi_read_timeout 99;
    }
}

# --- Configuration for /stage/ path ---
location ~ ^/stage/(.*)$ {
    # Rewrite the URL to remove /stage/ and allow CodeIgniter to handle it
    rewrite ^/stage/(.*)$ /$1 break;

    try_files $uri $uri/ /index.php?$query_string;

    # Pass PHP requests to the PHP-FPM service for this specific location
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO $fastcgi_path_info; # Keep this for CI to get path segments
        fastcgi_param  CI_ENVIRONMENT testing; # Set environment for staging (often 'testing' in CI4)
        include        fastcgi_params;
        fastcgi_buffers 8 8k;
        fastcgi_buffer_size 8k;
        fastcgi_read_timeout 99;
    }
}


# Have NGINX try searching for PHP files as well (This is your original general location block)
# This will act as the default if no /prod/, /devint/, or /stage/ prefix is present.
location / {
    try_files $uri $uri/ /index.php?$query_string;

    # Pass "*.php" files to PHP-FPM (This is your original PHP-FPM block, now nested)
    # The CI_ENVIRONMENT here would be the default if no prefix is matched.
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO $fastcgi_path_info; # Keep this for CI to get path segments
        fastcgi_param  CI_ENVIRONMENT production; # Default environment for direct access
        include        fastcgi_params;
        fastcgi_buffers 8 8k;
        fastcgi_buffer_size 8k;
        fastcgi_read_timeout 99;
    }
}

# additional config
include /etc/nginx/server-opts.d/*.conf;