# Listen on port 8080 as specified for the container
listen 8080 default_server;
listen [::]:8080 default_server;

# Set the default root directory for the application's public files
# This applies to requests not handled by specific location blocks with 'alias'.
root /var/www/html/public;

# Set allowed "index" files to be served when a directory is requested
index index.html index.htm index.php;

# Server name; '_' is a common placeholder when not using a specific domain
server_name _;

# Set character set for responses
charset utf-8;

# Set maximum allowed size for client request body (e.g., file uploads)
client_max_body_size 2048M;

# Healthcheck endpoint for AWS ECS
location /healthcheck {
    access_log off; # Do not log health check requests

    # Set maximum 5 seconds for healthcheck response
    fastcgi_read_timeout 5s;

    # Include standard fastcgi parameters
    include        fastcgi_params;
    # Explicitly set SCRIPT_NAME and SCRIPT_FILENAME for the healthcheck handler
    fastcgi_param  SCRIPT_NAME     /healthcheck;
    fastcgi_param  SCRIPT_FILENAME /healthcheck;
    # Pass the request to PHP-FPM
    fastcgi_pass   127.0.0.1:9000;
}

# Specific location block for requests coming via the /devint/ path
# This handles the load balancer rule for /devint/*
location /devint/ {
    # The 'alias' directive is used here because the URI prefix (/devint/)
    # is different from the actual file system path (/var/www/html/public/).
    # Nginx will strip '/devint/' from the request URI and append the remainder
    # to the 'alias' path to find the corresponding file.
    # Example: /devint/users/1 will map to /var/www/html/public/users/1
    alias /var/www/devint/public/;

    # Try to serve the requested URI directly (e.g., static assets like CSS/JS),
    # then try to serve an index file if the URI is a directory,
    # finally, fall back to index.php for CodeIgniter routing.
    # The $uri here still contains '/devint/', but 'alias' handles the path mapping
    # before file lookup. The /index.php refers to the file relative to the 'alias' path.
    try_files $uri $uri/ /index.php?$query_string;

    # This nested location block handles PHP files specifically within the /devint/ context.
    # It ensures that PHP requests under /devint/ are processed with the correct environment.
    location ~ \.php$ {
        # Pass PHP requests to PHP-FPM
        fastcgi_pass   127.0.0.1:9000;
        # Set the default PHP script name for index files
        fastcgi_index  index.php;

        # SCRIPT_FILENAME is crucial for PHP-FPM to find the correct script.
        # When 'alias' is used, $document_root is not the correct base.
        # $request_filename contains the full local file path corresponding to the
        # request URI after 'alias' processing (e.g., /var/www/html/public/index.php).
        fastcgi_param  SCRIPT_FILENAME  $request_filename;

        # PATH_INFO is important for CodeIgniter to parse URL segments (e.g., /users/1)
        fastcgi_param  PATH_INFO $fastcgi_path_info;

        # Set the CodeIgniter environment to 'development' for this path
        fastcgi_param  CI_ENVIRONMENT development;

        # Include standard fastcgi parameters
        include        fastcgi_params;

        # FastCGI buffer settings for performance
        fastcgi_buffers 8 8k;
        fastcgi_buffer_size 8k;
        fastcgi_read_timeout 99;
    }
}

# Default location block for all other paths not starting with /devint/
# This will typically handle direct access to the application or other environments.
location / {
    # Use the main 'root' directive: /var/www/html/public
    # Try to serve the requested URI directly, then a directory index,
    # finally, fall back to index.php for CodeIgniter routing.
    try_files $uri $uri/ /index.php?$query_string;

    # This nested location block handles PHP files for the default path.
    location ~ \.php$ {
        # Pass PHP requests to PHP-FPM
        fastcgi_pass   127.0.0.1:9000;
        # Set the default PHP script name for index files
        fastcgi_index  index.php;
        # SCRIPT_FILENAME points to the actual index.php file using the document root
        # fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  SCRIPT_FILENAME  /var/www/html/public/index.php;
        # PATH_INFO is important for CodeIgniter to parse URL segments
        fastcgi_param  PATH_INFO $fastcgi_path_info;
        # Set the CodeIgniter environment to 'production' for default access
        fastcgi_param  CI_ENVIRONMENT production;
        # Include standard fastcgi parameters
        include        fastcgi_params;
        # FastCGI buffer settings
        fastcgi_buffers 8 8k;
        fastcgi_buffer_size 8k;
        fastcgi_read_timeout 99;
    }
}

# Include any additional server options from the specified directory
include /etc/nginx/server-opts.d/*.conf;
